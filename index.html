<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Clicker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(#0a0a0a, #1a1a2e);
            color: #00ff9d;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            height: 100vh;
        }

        .game-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
        }

        /* LEFT COLUMN: The Bitcoin */
        .left-panel {
            flex: 0 0 33%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #ffd700;
            font-size: 1.1em;
            margin-bottom: 40px;
            text-shadow: 0 0 10px #ffd700;
        }

        #bitcoin {
            width: 280px;
            height: 280px;
            cursor: pointer;
            transition: transform 0.05s;
            filter: drop-shadow(0 0 20px rgba(242, 169, 0, 0.4));
        }

        #bitcoin:active { transform: scale(0.92); }

        #bitcoin img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* CENTER COLUMN: The News */
        .center-panel {
            flex: 1;
            border-left: 2px solid #333;
            border-right: 2px solid #333;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.2);
        }

        .news-ticker-container {
            width: 100%;
            height: 45px;
            background: #000;
            border-bottom: 2px solid #444;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
        }

        #news-text {
            white-space: nowrap;
            position: absolute;
            animation: ticker 20s linear infinite;
            font-size: 0.75em;
            color: #fff;
        }

        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* RIGHT COLUMN: The Store (Upgrades + Miners) */
        .right-panel {
            flex: 0 0 350px;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .store-header {
            background: #111;
            padding: 15px;
            text-align: center;
            color: #ffd700;
            border-bottom: 2px solid #ffd700;
            font-size: 1.2em;
        }

        /* Upgrades (Top section of Right Panel) */
        #upgrades-section {
            padding: 10px;
            min-height: 100px;
            border-bottom: 2px solid #444;
            background: rgba(255, 255, 255, 0.05);
        }

        .upgrade-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .upgrade-item {
            aspect-ratio: 1/1;
            background: #222;
            border: 2px solid #ffd700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
        }

        /* Miners (Bottom section of Right Panel) */
        #miners-section {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .item {
            display: flex;
            background: #1a1a1a;
            border: 2px solid #333;
            margin-bottom: 8px;
            padding: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .item:hover { background: #222; border-color: #00ff9d; }
        .item.locked { opacity: 0.3; cursor: not-allowed; }

        .item-icon { font-size: 2em; margin-right: 15px; }
        .item-details { flex: 1; }
        .item-name { font-size: 0.8em; color: #ffd700; margin-bottom: 4px; }
        .item-cost { font-size: 0.7em; color: #00ff9d; }
        .item-owned { font-size: 1.2em; color: #333; align-self: center; }

        /* Floating Text */
        .floating-text {
            position: absolute;
            color: #ffd700;
            font-weight: bold;
            pointer-events: none;
            z-index: 1000;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-80px); }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="left-panel">
            <h1>BITCOIN CLICKER</h1>
            <div id="bitcoin">
                <img src="imgs/bitcoin.png" alt="Bitcoin" onerror="this.src='https://via.placeholder.com/280x280/f2a900/111111?text=BTC';">
            </div>
            <div style="margin-top: 30px;">
                <div style="font-size: 1.5em;"><span id="balance">0</span> BTC</div>
                <div style="font-size: 0.7em; margin-top: 10px; color: #ffd700;">per second: <span id="bps">0</span></div>
            </div>
        </div>

        <div class="center-panel">
            <div class="news-ticker-container">
                <div id="news-text">Welcome to the mining rig. Start clicking to generate revenue...</div>
            </div>
            </div>

        <div class="right-panel">
            <div class="store-header">STORE</div>
            
            <div id="upgrades-section">
                <div class="upgrade-grid" id="upgrades-grid"></div>
            </div>

            <div id="miners-section">
                <div id="miners-list"></div>
            </div>
        </div>
    </div>

    <script>
        let bitcoin = 0;
        let bps = 0;
        let clickValue = 1;

        const miners = [
            { id: "gpu", name: "GPU Miner", cost: 15, owned: 0, production: 0.1, emoji: "🖥️" },
            { id: "asic", name: "ASIC Miner", cost: 100, owned: 0, production: 1, emoji: "⛏️" },
            { id: "farm", name: "Mining Farm", cost: 1100, owned: 0, production: 8, emoji: "🏭" },
            { id: "pool", name: "Mining Pool", cost: 12000, owned: 0, production: 47, emoji: "🌐" }
        ];

        const upgrades = [
            { id: "u1", name: "Better Mouse", cost: 100, icon: "🖱️", effect: () => clickValue *= 2 },
            { id: "u2", name: "Liquid Cooling", cost: 500, icon: "❄️", effect: () => bps *= 1.2 }
        ];

        function updateDisplay() {
            document.getElementById('balance').innerText = Math.floor(bitcoin).toLocaleString();
            document.getElementById('bps').innerText = bps.toFixed(1);
            renderMiners();
            renderUpgrades();
        }

        function renderMiners() {
            const list = document.getElementById('miners-list');
            list.innerHTML = '';
            miners.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = `item ${bitcoin < m.cost ? 'locked' : ''}`;
                div.innerHTML = `
                    <div class="item-icon">${m.emoji}</div>
                    <div class="item-details">
                        <div class="item-name">${m.name}</div>
                        <div class="item-cost">${Math.floor(m.cost)} BTC</div>
                    </div>
                    <div class="item-owned">${m.owned}</div>
                `;
                if (bitcoin >= m.cost) {
                    div.onclick = () => {
                        bitcoin -= m.cost;
                        m.owned++;
                        m.cost *= 1.15;
                        calculateBPS();
                        updateDisplay();
                    };
                }
                list.appendChild(div);
            });
        }

        function renderUpgrades() {
            const grid = document.getElementById('upgrades-grid');
            grid.innerHTML = '';
            upgrades.forEach((u, i) => {
                // Only show if we've reached 60% of the cost
                if (bitcoin > u.cost * 0.6) {
                    const div = document.createElement('div');
                    div.className = 'upgrade-item';
                    div.innerHTML = u.icon;
                    div.style.opacity = bitcoin >= u.cost ? '1' : '0.4';
                    div.onclick = () => {
                        if (bitcoin >= u.cost) {
                            bitcoin -= u.cost;
                            u.effect();
                            upgrades.splice(i, 1);
                            calculateBPS();
                            updateDisplay();
                        }
                    };
                    grid.appendChild(div);
                }
            });
        }

        function calculateBPS() {
            bps = miners.reduce((acc, m) => acc + (m.owned * m.production), 0);
        }

        document.getElementById('bitcoin').onclick = (e) => {
            bitcoin += clickValue;
            updateDisplay();
            
            const fly = document.createElement('div');
            fly.className = 'floating-text';
            fly.innerText = `+${clickValue}`;
            fly.style.left = e.clientX + 'px';
            fly.style.top = e.clientY + 'px';
            document.body.appendChild(fly);
            setTimeout(() => fly.remove(), 800);
        };

        // Main game loop
        setInterval(() => {
            bitcoin += bps / 10;
            updateDisplay();
        }, 100);

        updateDisplay();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Clicker</title>
    <style>

        * { -webkit-user-select: none; -ms-user-select: none; user-select: none; }
        
        body {
            margin: 0; padding: 0;
            background: linear-gradient(#0a0a0a, #1a1a2e);
            color: #00ff9d;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            height: 100vh;
        }

        #stats-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 4px solid #ffd700;
            padding: 30px;
            z-index: 2000;
            width: 450px; /* Widened for long suffix names */
            text-align: left;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1999;
        }
        .stats-line { margin: 15px 0; font-size: 0.6em; color: #fff; }
        .stats-val { color: #00ff9d; float: right; }
        .modal-btns { display: flex; gap: 10px; margin-top: 25px; }
        .modal-btns button { flex: 1; padding: 10px; font-family: inherit; font-size: 0.5em; cursor: pointer; border: none; }

        .game-container { display: flex; height: 100vh; width: 100vw; }

        .left-panel { flex: 0 0 33%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .center-panel { flex: 1; border-left: 2px solid #333; border-right: 2px solid #333; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); }
        .right-panel { flex: 0 0 400px; background: rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; height: 100%; }

        h1 { color: #ffd700; font-size: 1.1em; margin-bottom: 40px; text-shadow: 0 0 10px #ffd700; }
        #bitcoin { width: 280px; height: 280px; cursor: pointer; transition: transform 0.05s; filter: drop-shadow(0 0 20px rgba(242, 169, 0, 0.4)); }
        #bitcoin:active { transform: scale(0.92); }
        #bitcoin img { width: 100%; height: 100%; object-fit: contain; }

        .store-header { background: #111; padding: 15px; text-align: center; color: #ffd700; border-bottom: 2px solid #ffd700; font-size: 1.2em; }
        #upgrades-section { padding: 10px; min-height: 100px; border-bottom: 2px solid #444; background: rgba(255, 255, 255, 0.05); }
        .upgrade-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .upgrade-item { aspect-ratio: 1/1; background: #222; border: 2px solid #ffd700; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2em; }
        
        #miners-section { flex: 1; overflow-y: auto; padding: 10px; }
        .item { display: flex; background: #1a1a1a; border: 2px solid transparent; margin-bottom: 8px; padding: 10px; cursor: pointer; transition: 0.2s; }
        .item:not(.locked):hover { background: #2a2a2a; border-color: #ffd700; }
        .item.locked { opacity: 0.3; cursor: not-allowed; }
        .item-icon { font-size: 2em; margin-right: 15px; }
        .item-details { flex: 1; overflow: hidden; }
        .item-name { font-size: 0.7em; color: #ffd700; margin-bottom: 4px; white-space: nowrap; }
        .item-cost { font-size: 0.6em; }
        .item-cost.can-afford { color: #00ff9d; }
        .item-cost.cannot-afford { color: #ff4d4d; }
        .item-owned { font-size: 1.2em; color: #444; align-self: center; margin-left: 10px; }

        .floating-text { position: absolute; color: #ffd700; font-weight: bold; pointer-events: none; z-index: 1000; animation: floatUp 0.8s ease-out forwards; font-size: 0.8em; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }

        .tooltip { 
            position: absolute; display: none; background: #111; border: 2px solid #ffd700; 
            padding: 10px; color: #fff; font-size: 0.6em; z-index: 1000; pointer-events: none;
            line-height: 1.4; max-width: 250px;
        }

        .news-ticker-container { width: 100%; height: 45px; background: #000; border-bottom: 2px solid #444; overflow: hidden; position: relative; display: flex; align-items: center; }
        #news-text { white-space: nowrap; position: absolute; animation: ticker 20s linear infinite; font-size: 0.75em; color: #fff; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>

    // --- LOGIC ---

    function formatNum(n) {
        if (n < 1000) return Math.floor(n).toString();
        const tier = Math.floor(Math.log10(n) / 3);
        if (tier <= 0) return Math.floor(n).toString();
        if (tier >= suffixes.length) return n.toExponential(2);
        const suffix = suffixes[tier];
        const scale = Math.pow(10, tier * 3);
        const scaled = n / scale;
        return scaled.toFixed(2) + suffix;
    }

    function calculateCurrentBPS() {
    let totalBPS = 0;

    miners.forEach(m => {
        let count = gameData.ownedMiners[m.id] || 0;
        if (count > 0) {
            let minerMult = 1;
            
            // Filter only the upgrades you have already bought
            gameData.boughtUpgrades.forEach(uId => {
                // We only care about IDs that start with "m_b" (miner boosts)
                if (uId.startsWith("m_b")) {
                    const upgrade = upgrades.find(up => up.id === uId);
                    if (upgrade && upgrade.target === m.id) {
                        minerMult *= upgrade.boost;
                    }
                }
            });

            totalBPS += (count * m.production * minerMult);
        }
    });

    return totalBPS * gameData.bpsMultiplier * (gameData.boughtUpgrades.includes("n20") ? 2 : 1);
}
    function getMinerCost(miner) {
    const owned = gameData.ownedMiners[miner.id] || 0;
    // 1.28x increase means the price doubles roughly every 2.8 units bought
    return Math.floor(miner.baseCost * Math.pow(1.28, owned));
}

    function updateDisplay() {
        const bps = calculateCurrentBPS();
        document.getElementById('balance').innerText = formatNum(gameData.bitcoin);
        document.getElementById('bps').innerText = formatNum(bps);
        // We removed renderMiners and renderUpgrades from here
    }

    function renderMiners() {
    const list = document.getElementById('miners-list');
    list.innerHTML = '';
    miners.forEach((m) => {
        const cost = getMinerCost(m);
        const owned = gameData.ownedMiners[m.id] || 0;
        const canAfford = gameData.bitcoin >= cost;
        const div = document.createElement('div');
        div.className = `item ${!canAfford ? 'locked' : ''}`;
        div.innerHTML = `
            <div class="item-icon">${m.emoji}</div>
            <div class="item-details">
                <div class="item-name">${m.name}</div>
                <div class="item-cost ${canAfford ? 'can-afford' : 'cannot-afford'}">${formatNum(cost)} BTC</div>
            </div>
            <div class="item-owned">${owned}</div>`;
        
        div.onmousemove = (e) => showTooltip(e, `<div style="color:#ffd700">${m.name}</div><div>Gives ${formatNum(m.production)} BTC/s</div>`);
        div.onmouseleave = hideTooltip;
        
        div.onclick = () => { 
            if (canAfford) { 
                gameData.bitcoin -= cost; 
                gameData.ownedMiners[m.id] = (gameData.ownedMiners[m.id] || 0) + 1; 
                updateDisplay(); 
                saveGame(); 
            } 
        };
        list.appendChild(div);
    });

                div.onmousemove = (e) => showTooltip(e, `
                    <div style="color:#ffd700">${u.name}</div>
                    <div style="color:${canAfford ? '#00ff9d' : '#ff4d4d'}">Cost: ${formatNum(u.cost)} BTC</div>
                    <div style="font-size:0.7em; margin-top:5px;">${u.desc || `Boosts ${u.type} by ${u.boost}x`}</div>
                `);
                div.onmouseleave = hideTooltip;
                
                div.onclick = () => { 
                    if (canAfford) { 
                        gameData.bitcoin -= u.cost; 
                        gameData.boughtUpgrades.push(u.id); 
                        if (u.type === 'click') gameData.clickValue *= u.boost; 
                        if (u.type === 'bps') gameData.bpsMultiplier *= u.boost; 
                        if (u.id === 'offline') gameData.isOfflineEnabled = true; 
                        hideTooltip(); 
                        updateDisplay(); 
                        saveGame(); 
                    } 
                };
                grid.appendChild(div);
            }
        });
    }
    function toggleStats(show) {
        document.getElementById('stats-modal').style.display = show ? 'block' : 'none';
        document.getElementById('modal-bg').style.display = show ? 'block' : 'none';
        if(show) {
            document.getElementById('stat-current').innerText = formatNum(gameData.bitcoin);
            document.getElementById('stat-total').innerText = formatNum(gameData.totalMined);
            document.getElementById('stat-clicks').innerText = gameData.totalClicks.toLocaleString();
            document.getElementById('stat-bps-modal').innerText = formatNum(calculateCurrentBPS());
        }
    }
document.getElementById('bitcoin').onclick = (e) => {
        let val = gameData.clickValue;
        if (gameData.boughtUpgrades.includes("n20")) val *= 10;
        gameData.bitcoin += val;
        gameData.totalMined += val;
        gameData.totalClicks++;
        
        // Update ONLY the balance text immediately
        document.getElementById('balance').innerText = formatNum(gameData.bitcoin);
        
        const fly = document.createElement('div');
        fly.className = 'floating-text';
        fly.innerText = `+${formatNum(val)}`;
        fly.style.left = e.clientX + 'px'; fly.style.top = e.clientY + 'px';
        document.body.appendChild(fly);
        setTimeout(() => fly.remove(), 800);
    };
    function saveGame() { gameData.lastSaveTime = Date.now(); localStorage.setItem('btcClickerSave', JSON.stringify(gameData)); }
    function loadGame() {
        const saved = localStorage.getItem('btcClickerSave');
        if (saved) {
            gameData = Object.assign({}, gameData, JSON.parse(saved));
            if (gameData.isOfflineEnabled) {
                const away = Math.floor((Date.now() - gameData.lastSaveTime) / 1000);
                if (away > 5) {
                    const earned = (calculateCurrentBPS() * 0.5) * away;
                    gameData.bitcoin += earned; gameData.totalMined += earned;
                    alert(`Away for ${away}s, mined ${formatNum(earned)} BTC!`);
                }
            }
        }
        updateDisplay();
    }
    function resetGame() { if(confirm("Reset everything?")) { localStorage.removeItem('btcClickerSave'); location.reload(); } }
    function showTooltip(e, content) { const t = document.getElementById('tooltip'); t.style.display = 'block'; t.style.left = (e.pageX + 15) + 'px'; t.style.top = (e.pageY + 15) + 'px'; t.innerHTML = content; }
    function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }
    function updateNews() {
        const news = document.getElementById('news-text');
        news.innerText = newsMessages[currentNewsIndex];
        currentNewsIndex = (currentNewsIndex + 1) % newsMessages.length;
        news.style.animation = 'none'; news.offsetHeight; news.style.animation = 'ticker 20s linear infinite';
    }

    let currentNewsIndex = 0;

// 1. FAST INTERVAL: Only updates numbers (Smooth & Fast)
setInterval(() => { 
    let bps = calculateCurrentBPS(); 
    gameData.bitcoin += bps; 
    gameData.totalMined += bps; 
    
    // Update the numbers on screen
    document.getElementById('balance').innerText = formatNum(gameData.bitcoin);
    document.getElementById('bps').innerText = formatNum(bps);
}, 1000);

// 2. SLOW INTERVAL: Only refreshes the store buttons (Prevents Freezing)
setInterval(() => {
    renderMiners();
    renderUpgrades();
}, 2000); // Every 2 seconds is plenty

setInterval(saveGame, 30000); 
setInterval(updateNews, 20000);
    // This starts the engine!
loadGame();
renderMiners();
renderUpgrades();
updateNews();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Clicker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(#0a0a0a, #1a1a2e);
            color: #00ff9d;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            height: 100vh;
        }

        .game-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        /* LEFT PANEL - The Clicker */
        .left-panel {
            flex: 0 0 30%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 2px dashed #00ff9d;
        }

        h1 {
            color: #ffd700;
            font-size: 1.2em;
            text-align: center;
            margin-bottom: 30px;
        }

        #bitcoin {
            width: 250px;
            height: 250px;
            cursor: pointer;
            transition: transform 0.05s;
        }

        #bitcoin:active { transform: scale(0.95); }

        #bitcoin img { width: 100%; height: 100%; }

        /* CENTER PANEL - The News Ticker */
        .center-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-top: 20px;
        }

        .news-ticker {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #ffd700;
            height: 40px;
            overflow: hidden;
            display: flex;
            align-items: center;
            position: relative;
        }

        #news-text {
            white-space: nowrap;
            position: absolute;
            animation: ticker 15s linear infinite;
            font-size: 0.7em;
            color: #fff;
        }

        @keyframes ticker {
            0% { left: 100%; }
            100% { left: -100%; }
        }

        /* RIGHT PANEL - The Store (Upgrades & Miners) */
        .right-panel {
            flex: 0 0 320px;
            background: rgba(0, 0, 0, 0.4);
            border-left: 4px solid #444;
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100%;
        }

        .store-header {
            background: #222;
            padding: 10px;
            text-align: center;
            color: #ffd700;
            border-bottom: 2px solid #ffd700;
        }

        .section {
            padding: 10px;
            overflow-y: auto;
        }

        /* UPGRADES AREA - Top portion */
        #upgrades-section {
            flex: 0 0 120px;
            border-bottom: 2px solid #444;
        }

        .upgrade-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }

        .upgrade-item {
            width: 50px;
            height: 50px;
            background: #333;
            border: 2px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2em;
        }

        /* MINERS AREA - Bottom portion */
        #miners-section {
            flex: 1;
        }

        .item {
            display: flex;
            align-items: center;
            background: #222;
            border: 1px solid #00ff9d;
            margin-bottom: 5px;
            padding: 5px;
            cursor: pointer;
        }

        .item:hover { background: #333; }
        .item.locked { opacity: 0.4; cursor: not-allowed; }

        .item-icon { font-size: 2em; margin-right: 10px; }
        .item-info { flex: 1; }
        .item-name { font-size: 0.7em; color: #ffd700; }
        .item-cost { font-size: 0.6em; color: #00ff9d; }
        .item-count { font-size: 1.2em; color: #444; margin-left: 10px; }

        .floating-text {
            position: absolute;
            color: #ffd700;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="left-panel">
            <h1>BITCOIN CLICKER</h1>
            <div id="bitcoin">
                <img src="https://via.placeholder.com/250x250/f2a900/111111?text=₿" alt="Bitcoin">
            </div>
            <div style="margin-top:20px; text-align:center;">
                <span id="bitcoin-count">0</span> BTC<br>
                <small style="font-size:0.6em">per second: <span id="bps">0</span></small>
            </div>
        </div>

        <div class="center-panel">
            <div class="news-ticker">
                <div id="news-text">Gathering hash power... Market is looking bullish today!</div>
            </div>
        </div>

        <div class="right-panel">
            <div class="store-header">STORE</div>
            
            <div class="section" id="upgrades-section">
                <div class="upgrade-grid" id="upgrades-grid"></div>
            </div>

            <div class="section" id="miners-section">
                <div id="miners-list"></div>
            </div>
        </div>
    </div>

    <script>
        let bitcoin = 0;
        let bps = 0;
        let clickValue = 1;

        const miners = [
            { id: "gpu", name: "GPU", cost: 15, owned: 0, production: 0.1, emoji: "🖥️" },
            { id: "asic", name: "ASIC", cost: 100, owned: 0, production: 1, emoji: "⛏️" },
            { id: "farm", name: "Farm", cost: 1100, owned: 0, production: 8, emoji: "🏭" },
            { id: "pool", name: "Pool", cost: 12000, owned: 0, production: 47, emoji: "🌐" }
        ];

        const upgrades = [
            { id: "u1", name: "Mouse", cost: 100, icon: "🖱️", effect: () => clickValue *= 2 },
            { id: "u2", name: "Cooling", cost: 500, icon: "❄️", effect: () => bps *= 1.1 }
        ];

        function render() {
            document.getElementById('bitcoin-count').innerText = Math.floor(bitcoin);
            document.getElementById('bps').innerText = bps.toFixed(1);

            // Render Miners
            const minersList = document.getElementById('miners-list');
            minersList.innerHTML = '';
            miners.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = `item ${bitcoin < m.cost ? 'locked' : ''}`;
                div.innerHTML = `
                    <div class="item-icon">${m.emoji}</div>
                    <div class="item-info">
                        <div class="item-name">${m.name}</div>
                        <div class="item-cost">${Math.floor(m.cost)} BTC</div>
                    </div>
                    <div class="item-count">${m.owned}</div>
                `;
                div.onclick = () => {
                    if(bitcoin >= m.cost) {
                        bitcoin -= m.cost;
                        m.owned++;
                        m.cost *= 1.15;
                        updateBPS();
                        render();
                    }
                };
                minersList.appendChild(div);
            });

            // Render Upgrades
            const upgradesGrid = document.getElementById('upgrades-grid');
            upgradesGrid.innerHTML = '';
            upgrades.forEach((u) => {
                if(bitcoin > u.cost * 0.5) {
                    const div = document.createElement('div');
                    div.className = 'upgrade-item';
                    div.innerHTML = u.icon;
                    div.title = `${u.name}: ${u.cost} BTC`;
                    div.onclick = () => {
                        if(bitcoin >= u.cost) {
                            bitcoin -= u.cost;
                            u.effect();
                            upgrades.splice(upgrades.indexOf(u), 1);
                            render();
                        }
                    };
                    upgradesGrid.appendChild(div);
                }
            });
        }

        function updateBPS() {
            bps = miners.reduce((acc, m) => acc + (m.owned * m.production), 0);
        }

        document.getElementById('bitcoin').onclick = (e) => {
            bitcoin += clickValue;
            render();
            const fly = document.createElement('div');
            fly.className = 'floating-text';
            fly.innerText = `+${clickValue}`;
            fly.style.left = e.clientX + 'px';
            fly.style.top = e.clientY + 'px';
            document.body.appendChild(fly);
            setTimeout(() => fly.remove(), 1000);
        };

        setInterval(() => {
            bitcoin += bps / 10;
            render();
        }, 100);

        render();
    </script>
</body>
</html>

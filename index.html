<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Clicker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(#0a0a0a, #1a1a2e);
            color: #00ff9d;
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            gap: 20px;
        }

        .left-panel {
            flex: 1;
            min-width: 300px;
        }

        .right-panel {
            flex: 2;
            min-width: 400px;
        }

        h1 {
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
            margin: 20px 0;
            font-size: 2.5em;
        }

        #bitcoin {
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, #f2a900, #d97700);
            border-radius: 50%;
            margin: 30px auto;
            cursor: pointer;
            box-shadow: 0 0 40px #f2a900,
                        inset 0 0 60px rgba(255,255,255,0.6);
            transition: transform 0.1s;
            user-select: none;
        }

        #bitcoin:active {
            transform: scale(0.85);
        }

        #click-value {
            position: absolute;
            font-size: 1.2em;
            color: #ffd700;
            pointer-events: none;
            text-shadow: 2px 2px 4px black;
            animation: floatUp 1.5s forwards;
        }

        .stats {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 4px solid #00ff9d;
            margin: 20px 0;
            font-size: 1.1em;
        }

        .shop {
            background: rgba(0, 0, 0, 0.8);
            border: 4px solid #ffd700;
            padding: 15px;
            max-height: 600px;
            overflow-y: auto;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a2e;
            margin: 10px 0;
            padding: 15px;
            border: 3px solid #00ff9d;
            cursor: pointer;
            transition: all 0.2s;
        }

        .item:hover {
            background: #2a2a4e;
            border-color: #ffd700;
            transform: scale(1.03);
        }

        .item.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .item-name {
            font-size: 1.1em;
            color: #ffd700;
        }

        .item-cost {
            color: #ff4444;
            font-weight: bold;
        }

        .item-owned {
            color: #00ff9d;
            font-size: 0.9em;
        }

        button {
            background: #ffd700;
            color: black;
            border: none;
            padding: 12px 24px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1em;
            cursor: pointer;
            margin: 10px;
        }

        button:hover {
            background: #ffed4e;
        }

        .floating-text {
            position: absolute;
            color: #00ff9d;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-80px); }
        }

        footer {
            margin-top: 30px;
            font-size: 0.8em;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Panel: Big Bitcoin -->
        <div class="left-panel">
            <h1>BITCOIN CLICKER</h1>
            <div style="position: relative;">
                <div id="bitcoin">₿</div>
            </div>
            <div class="stats">
                <h2>Bitcoin: <span id="bitcoin-count">0</span></h2>
                <p>Per second: <span id="bitcoin-per-second">0</span></p>
            </div>
        </div>

        <!-- Right Panel: Shop -->
        <div class="right-panel">
            <h2>MINERS &amp; UPGRADES</h2>
            <div class="shop" id="shop"></div>
        </div>
    </div>

    <footer>Made with ❤️ for the Bitcoin community • Inspired by Cookie Clicker</footer>

    <script>
        // Game Variables
        let bitcoin = 0;
        let bitcoinPerSecond = 0;
        let clickValue = 1;

        // Items (Miners & Upgrades)
        let items = [
            { id: "gpu", name: "GPU Miner", baseCost: 15, cost: 15, owned: 0, production: 0.1, emoji: "🖥️" },
            { id: "asic", name: "ASIC Miner", baseCost: 100, cost: 100, owned: 0, production: 1, emoji: "⛏️" },
            { id: "farm", name: "Mining Farm", baseCost: 500, cost: 500, owned: 0, production: 8, emoji: "🏭" },
            { id: "pool", name: "Mining Pool", baseCost: 2000, cost: 2000, owned: 0, production: 40, emoji: "🌐" },
            { id: "satellite", name: "Satellite Miner", baseCost: 10000, cost: 10000, owned: 0, production: 200, emoji: "🛰️" },
            { id: "halving", name: "Halving Protection", baseCost: 50000, cost: 50000, owned: 0, production: 1000, emoji: "🔄" }
        ];

        const bitcoinElement = document.getElementById('bitcoin');
        const bitcoinCountElement = document.getElementById('bitcoin-count');
        const bitcoinPerSecondElement = document.getElementById('bitcoin-per-second');
        const shopElement = document.getElementById('shop');

        // Create floating text when clicking Bitcoin
        function createFloatingText(x, y, amount) {
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.textContent = `+${amount}`;
            text.style.left = `${x}px`;
            text.style.top = `${y}px`;
            document.body.appendChild(text);

            setTimeout(() => text.remove(), 1000);
        }

        // Click handler
        bitcoinElement.addEventListener('click', (e) => {
            bitcoin += clickValue;
            
            const rect = bitcoinElement.getBoundingClientRect();
            const clickX = e.clientX - rect.left + rect.left + (Math.random() * 40 - 20);
            const clickY = e.clientY - rect.top + rect.top - 30;

            createFloatingText(clickX, clickY, clickValue);

            updateDisplay();
        });

        // Buy item
        function buyItem(index) {
            const item = items[index];
            if (bitcoin >= item.cost) {
                bitcoin -= item.cost;
                item.owned++;
                bitcoinPerSecond += item.production;

                // Increase cost for next purchase (exponential growth)
                item.cost = Math.ceil(item.baseCost * Math.pow(1.15, item.owned));

                updateDisplay();
                renderShop();
            }
        }

        // Render the shop
        function renderShop() {
            shopElement.innerHTML = '';
            items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `item ${bitcoin < item.cost ? 'locked' : ''}`;
                div.innerHTML = `
                    <div>
                        <span style="font-size: 1.8em;">${item.emoji}</span><br>
                        <span class="item-name">${item.name}</span><br>
                        <span class="item-owned">Owned: ${item.owned}</span>
                    </div>
                    <div style="text-align: right;">
                        <span class="item-cost">${Math.floor(item.cost)} ₿</span><br>
                        <small>+${item.production} ₿/s</small>
                    </div>
                `;
                div.addEventListener('click', () => buyItem(index));
                shopElement.appendChild(div);
            });
        }

        // Update main display
        function updateDisplay() {
            bitcoinCountElement.textContent = Math.floor(bitcoin);
            bitcoinPerSecondElement.textContent = bitcoinPerSecond.toFixed(1);
        }

        // Game loop (every 100ms)
        setInterval(() => {
            bitcoin += bitcoinPerSecond / 10;
            updateDisplay();
        }, 100);

        // Auto-save every 10 seconds
        setInterval(() => {
            localStorage.setItem('bitcoinClickerSave', JSON.stringify({
                bitcoin: bitcoin,
                items: items
            }));
        }, 10000);

        // Load save
        function loadSave() {
            const saved = localStorage.getItem('bitcoinClickerSave');
            if (saved) {
                const data = JSON.parse(saved);
                bitcoin = data.bitcoin || 0;
                
                if (data.items) {
                    items = data.items;
                    // Recalculate bitcoinPerSecond
                    bitcoinPerSecond = items.reduce((sum, item) => sum + (item.production * item.owned), 0);
                }
            }
        }

        // Initialize game
        function init() {
            loadSave();
            renderShop();
            updateDisplay();
        }

        window.onload = init;
    </script>
</body>
</html>

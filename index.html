<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Clicker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0; padding: 0;
            background: linear-gradient(#0a0a0a, #1a1a2e);
            color: #00ff9d;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            height: 100vh;
        }

        .game-container { display: flex; height: 100vh; width: 100vw; }

        /* PANELS */
        .left-panel { flex: 0 0 33%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .center-panel { flex: 1; border-left: 2px solid #333; border-right: 2px solid #333; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); }
        .right-panel { flex: 0 0 350px; background: rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; height: 100%; }

        /* BITCOIN */
        h1 { color: #ffd700; font-size: 1.1em; margin-bottom: 40px; text-shadow: 0 0 10px #ffd700; }
        #bitcoin { width: 280px; height: 280px; cursor: pointer; transition: transform 0.05s; filter: drop-shadow(0 0 20px rgba(242, 169, 0, 0.4)); }
        #bitcoin:active { transform: scale(0.92); }
        #bitcoin img { width: 100%; height: 100%; object-fit: contain; }

        /* STORE */
        .store-header { background: #111; padding: 15px; text-align: center; color: #ffd700; border-bottom: 2px solid #ffd700; font-size: 1.2em; }
        #upgrades-section { padding: 10px; min-height: 100px; border-bottom: 2px solid #444; background: rgba(255, 255, 255, 0.05); }
        .upgrade-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .upgrade-item { aspect-ratio: 1/1; background: #222; border: 2px solid #ffd700; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2em; }
        
        #miners-section { flex: 1; overflow-y: auto; padding: 10px; }
        .item { display: flex; background: #1a1a1a; border: 2px solid transparent; margin-bottom: 8px; padding: 10px; cursor: pointer; transition: 0.2s; }
        .item:not(.locked):hover { background: #2a2a2a; border-color: #ffd700; }
        .item.locked { opacity: 0.3; cursor: not-allowed; }
        .item-icon { font-size: 2em; margin-right: 15px; }
        .item-details { flex: 1; }
        .item-name { font-size: 0.8em; color: #ffd700; margin-bottom: 4px; }
        .item-cost.can-afford { color: #00ff9d; }
        .item-cost.cannot-afford { color: #ff4d4d; }
        .item-owned { font-size: 1.2em; color: #333; align-self: center; }

        .floating-text { position: absolute; color: #ffd700; font-weight: bold; pointer-events: none; z-index: 1000; animation: floatUp 0.8s ease-out forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }

        .tooltip { 
            position: absolute; display: none; background: #111; border: 2px solid #ffd700; 
            padding: 10px; color: #fff; font-size: 0.6em; z-index: 1000; pointer-events: none;
            line-height: 1.4; max-width: 200px;
        }

        .news-ticker-container { width: 100%; height: 45px; background: #000; border-bottom: 2px solid #444; overflow: hidden; position: relative; display: flex; align-items: center; }
        #news-text { white-space: nowrap; position: absolute; animation: ticker 20s linear infinite; font-size: 0.75em; color: #fff; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="left-panel">
            <h1>BITCOIN CLICKER</h1>
            <div id="bitcoin">
                <img src="imgs/Bitcoin.png" alt="Bitcoin" onerror="this.src='https://via.placeholder.com/280x280/f2a900/111111?text=BTC';">
            </div>
            <div style="margin-top: 30px;">
                <div style="font-size: 1.5em;"><span id="balance">0</span> BTC</div>
                <div style="font-size: 0.7em; margin-top: 10px; color: #ffd700;">per second: <span id="bps">0</span></div>
            </div>
            <button onclick="resetGame()" style="margin-top: 20px; font-family: inherit; font-size: 0.5em; cursor: pointer; background: #ff4d4d; border: none; padding: 5px;">RESET SAVE</button>
        </div>

        <div class="center-panel">
            <div class="news-ticker-container">
                <div id="news-text"></div>
            </div>
        </div>

        <div class="right-panel">
            <div class="store-header">STORE</div>
            <div id="upgrades-section">
                <div class="upgrade-grid" id="upgrades-grid"></div>
            </div>
            <div id="miners-section">
                <div id="miners-list"></div>
            </div>
        </div>
    </div>

    <div id="tooltip" class="tooltip"></div>

    <script>
        // --- GAME STATE ---
        let gameData = {
            bitcoin: 0,
            clickValue: 1,
            bpsMultiplier: 1,
            isOfflineEnabled: false,
            lastSaveTime: Date.now(),
            ownedMiners: {},
            boughtUpgrades: []
        };

        const newsMessages = [
            'Welcome to Bitcoin Clicker! Start clicking to generate Bitcoins',
            'Local business man becomes trillionare after investing in crypto',
            'Elon Musk states "Forever in dogecoin" and riots start in the streets',
            'Beware of bitcoin scams, some give you dogecoin instead'
        ];

      const minerNames = [
    // --- 1-20: THE HARDWARE ERA ---
    "Lemon Battery", "Potato Circuit", "Calculated Abacus", "Rust-Bucket PC", "Budget Laptop", 
    "Office Desktop", "Gaming Rig", "Overclocked Station", "Pro Miner Rack", "Liquid-Cooled Array", 
    "Nitro-Injected GPU", "ASIC Prototype", "Industrial ASIC", "Server Closet", "Data Center Unit", 
    "Mainframe Core", "Supercomputer Node", "Quantum Chipset", "Cold Storage Vault", "Silicon Valley Hub",
    
    // --- 21-40: THE DIGITAL FRONTIER ---
    "Cloud Instance", "Virtual Machine", "Botnet Cluster", "Dark Web Node", "Encryption Engine", 
    "Blockchain Relay", "Smart Contract Automaton", "Neural Network", "Deep Learning Hive", "AI Algorithm", 
    "Digital Ghost", "Data Siphon", "Algorithm Optimizer", "Logic Gate Array", "Cyber-Hive Mind", 
    "Binary Fountain", "Firewall Bypass", "Rootkit Miner", "Synthesized Reality", "Metaverse Server",
    
    // --- 41-60: THE PLANETARY SCALE ---
    "Geothermal Rig", "Arctic Mining Vault", "Oceanic Server Floor", "Volcanic Power Plant", "Orbital Satellite", 
    "Lunar Outpost", "Mars Colony Link", "Asteroid Driller", "Solar Array", "Atmospheric Siphon", 
    "Tectonic Generator", "Magma Core Miner", "Planetary Wi-Fi", "Global Mesh-Net", "Saturnian Ring Miner", 
    "Jupiter Gas Refiner", "Titan Ice Station", "Venusian Heat Sink", "Icy Comet Rig", "Dwarf Planet Relay",
    
    // --- 61-80: THE GALACTIC EXPANSION ---
    "Star Harvester", "Dyson Swarm Fragment", "Nebula Gas Sifter", "Supernova Collector", "Black Hole Rim Node", 
    "Event Horizon Link", "Dark Matter Reactor", "Antimatter Forge", "Wormhole Tunnel", "Galactic Core Hub", 
    "Quasar Beaming Station", "Pulsar Clock Sync", "Interstellar Cable", "Void Energy Siphon", "Cosmic Ray Mirror", 
    "Gravity Wave Miner", "Spacetime Loom", "Light-Speed Array", "Orion Belt Mining", "Andromeda Uplink",
    
    // --- 81-100: THE COSMIC & DIVINE ---
    "Dimensional Breach", "Reality Warper", "Timeline Splitter", "Entropy Inverter", "Universal Engine", 
    "String Theory Weaver", "Multiverse Bridge", "Quantum Immortality Rig", "Existence Validator", "Laws of Physics Editor", 
    "Celestial Architect", "Omega Point Node", "Simulation Overlord", "Concept Harvester", "Thought Form Miner", 
    "The Source Code", "Absolute Zero Engine", "Infinity Siphon", "Eternity Engine", "The Bitcoin Singularity"
];

const miners = [];

// Generate the 100 unique miners
for (let i = 0; i < 100; i++) {
    miners.push({
        id: `miner_${i}`,
        name: minerNames[i],
        // Cost starts at 15 and grows by 45% each step
        baseCost: Math.floor(15 * Math.pow(1.45, i)),
        // Production starts at 0.1 and grows by 40% each step
        production: Number((0.1 * Math.pow(1.40, i)).toFixed(2)),
        emoji: getEmojiForTier(i)
    });
}

// Helper function to pick emojis based on progress
function getEmojiForTier(index) {
    if (index < 20) return "💻";
    if (index < 40) return "🌐";
    if (index < 60) return "🚀";
    if (index < 80) return "🌌";
    return "👁️";
}
        // --- UPGRADE DATA ---
const upgrades = [
    // --- STARTER UPGRADES ---
    { id: "u1", name: "Pro Mouse", cost: 100, icon: "🖱️", type: "click", boost: 2 },
    { id: "u2", name: "Liquid Cooling", cost: 500, icon: "❄️", type: "bps", boost: 1.2 },
    { id: "offline", name: "Offline Collector", cost: 5000, icon: "💤", type: "special", desc: "Earn 50% while away!" },
    { id: "u3", name: "Golden Click", cost: 2000, icon: "✨", type: "click", boost: 5 },

    // --- NEW TIER 1: EARLY GAME (8k - 150k) ---
    { id: "n1", name: "Gaming Chair", cost: 8000, icon: "💺", type: "click", boost: 2 },
    { id: "n2", name: "Fiber Optic", cost: 15000, icon: "⚡", type: "bps", boost: 1.5 },
    { id: "n3", name: "Energy Drink", cost: 30000, icon: "🥤", type: "click", boost: 2 },
    { id: "n4", name: "Server Rack", cost: 75000, icon: "🗄️", type: "bps", boost: 1.4 },
    { id: "n5", name: "Diamond Cursor", cost: 150000, icon: "💎", type: "click", boost: 3 },

    // --- NEW TIER 2: MID GAME (300k - 10M) ---
    { id: "n6", name: "Satellite Link", cost: 300000, icon: "📡", type: "bps", boost: 1.6 },
    { id: "n7", name: "Macro Script", cost: 500000, icon: "📜", type: "click", boost: 2 },
    { id: "n8", name: "Power Plant", cost: 1000000, icon: "☢️", type: "bps", boost: 1.5 },
    { id: "n9", name: "Quantum CPU", cost: 2500000, icon: "🧬", type: "click", boost: 4 },
    { id: "n10", name: "Global Mesh", cost: 5000000, icon: "🌍", type: "bps", boost: 2 },

    // --- NEW TIER 3: LATE GAME (10M - 500M) ---
    { id: "n11", name: "Robo-Clicker", cost: 10000000, icon: "🤖", type: "click", boost: 2 },
    { id: "n12", name: "Deep Sea Cables", cost: 25000000, icon: "⚓", type: "bps", boost: 1.8 },
    { id: "n13", name: "Neural Link", cost: 75000000, icon: "🧠", type: "click", boost: 3 },
    { id: "n14", name: "Space Solar", cost: 150000000, icon: "☀️", type: "bps", boost: 2 },
    { id: "n15", name: "Time Warp", cost: 500000000, icon: "⏳", type: "click", boost: 5 },

    // --- NEW TIER 4: END GAME (1B - 1T) ---
    { id: "n16", name: "Dyson Swarm", cost: 1000000000, icon: "🛸", type: "bps", boost: 2.5 },
    { id: "n17", name: "God Protocol", cost: 5000000000, icon: "👁️", type: "click", boost: 10 },
    { id: "n18", name: "Multiverse Hub", cost: 25000000000, icon: "🌀", type: "bps", boost: 3 },
    { id: "n19", name: "Infinite Loop", cost: 100000000000, icon: "♾️", type: "click", boost: 2 },
    { id: "n20", name: "The Singularity", cost: 1000000000000, icon: "🌌", type: "special", boost: 10, desc: "Final Upgrade: 10x EVERYTHING!" }
];

        // --- SAVE SYSTEM ---
        function saveGame() {
            gameData.lastSaveTime = Date.now();
            localStorage.setItem('btcClickerSave', JSON.stringify(gameData));
        }

        // Save when user closes the tab
        window.onbeforeunload = function() {
            saveGame();
        };

        function loadGame() {
            const saved = localStorage.getItem('btcClickerSave');
            if (saved) {
                const loadedData = JSON.parse(saved);
                gameData = { ...gameData, ...loadedData };
                
                // Calculate Offline Earnings
                if (gameData.isOfflineEnabled) {
                    const now = Date.now();
                    const secondsAway = Math.floor((now - gameData.lastSaveTime) / 1000);
                    
                    // Trigger only if away for more than 5 seconds
                    if (secondsAway > 5) {
                        const activeBps = calculateCurrentBPS();
                        // Apply the 50% penalty ONLY to the offline portion
                        const earned = (activeBps * 0.5) * secondsAway;
                        
                        gameData.bitcoin += earned;
                        alert(`While you were gone for ${secondsAway}s, your rigs mined ${earned.toFixed(1)} BTC at 50% efficiency!`);
                    }
                }
            }
            updateDisplay();
        }

        function resetGame() {
            if(confirm("Are you sure? This deletes everything!")) {
                localStorage.removeItem('btcClickerSave');
                location.reload();
            }
        }

        // --- LOGIC ---
        ffunction calculateCurrentBPS() {
    let base = 0;
    miners.forEach(m => {
        const count = gameData.ownedMiners[m.id] || 0;
        base += count * m.production;
    });

    // Apply standard multiplier
    let total = base * gameData.bpsMultiplier;

    // FIX: Apply 10x boost if Singularity is owned
    if (gameData.boughtUpgrades.includes("n20")) {
        total *= 10;
    }

    return total;
}

        function getMinerCost(miner) {
            const count = gameData.ownedMiners[miner.id] || 0;
            return Math.floor(miner.baseCost * Math.pow(1.15, count));
        }

        function updateDisplay() {
            const currentBps = calculateCurrentBPS();
            document.getElementById('balance').innerText = Math.floor(gameData.bitcoin).toLocaleString();
            document.getElementById('bps').innerText = currentBps.toFixed(1);
            renderMiners();
            renderUpgrades();
        }

        function renderMiners() {
            const list = document.getElementById('miners-list');
            list.innerHTML = '';
            miners.forEach((m) => {
                const cost = getMinerCost(m);
                const owned = gameData.ownedMiners[m.id] || 0;
                const canAfford = gameData.bitcoin >= cost;
                
                const div = document.createElement('div');
                div.className = `item ${!canAfford ? 'locked' : ''}`;
                div.innerHTML = `
                    <div class="item-icon">${m.emoji}</div>
                    <div class="item-details">
                        <div class="item-name">${m.name}</div>
                        <div class="item-cost ${canAfford ? 'can-afford' : 'cannot-afford'}">${cost.toLocaleString()} BTC</div>
                    </div>
                    <div class="item-owned">${owned}</div>
                `;
                
                div.onmousemove = (e) => showTooltip(e, `
                    <div style="color:#ffd700">${m.name}</div>
                    <div>Gives ${m.production} BTC/s</div>
                `);
                div.onmouseleave = hideTooltip;

                div.onclick = () => {
                    if (gameData.bitcoin >= cost) {
                        gameData.bitcoin -= cost;
                        gameData.ownedMiners[m.id] = owned + 1;
                        updateDisplay();
                        saveGame();
                    }
                };
                list.appendChild(div);
            });
        }

        function renderUpgrades() {
            const grid = document.getElementById('upgrades-grid');
            grid.innerHTML = '';

            upgrades.forEach((u) => {
                if (gameData.boughtUpgrades.includes(u.id)) return;

                if (gameData.bitcoin > u.cost * 0.5) {
                    const canAfford = gameData.bitcoin >= u.cost;
                    const div = document.createElement('div');
                    div.className = 'upgrade-item';
                    div.innerHTML = u.icon;
                    div.style.opacity = canAfford ? '1' : '0.4';

                    div.onmousemove = (e) => {
                        let desc = u.desc || `Boosts ${u.type === 'click' ? 'Click' : 'BPS'} by ${u.boost}x`;
                        showTooltip(e, `
                            <div style="color:#ffd700">${u.name}</div>
                            <div style="color:${canAfford ? '#00ff9d' : '#ff4d4d'}">Cost: ${u.cost} BTC</div>
                            <div style="font-size:0.7em; margin-top:5px;">${desc}</div>
                        `);
                    };
                    div.onmouseleave = hideTooltip;

                    div.onclick = () => {
                        if (canAfford) {
                            gameData.bitcoin -= u.cost;
                            gameData.boughtUpgrades.push(u.id);
                            
                            if (u.type === 'click') gameData.clickValue *= u.boost;
                            if (u.type === 'bps') gameData.bpsMultiplier *= u.boost;
                            if (u.id === 'offline') gameData.isOfflineEnabled = true;

                            hideTooltip();
                            updateDisplay();
                            saveGame();
                        }
                    };
                    grid.appendChild(div);
                }
            });
        }

        // --- TOOLTIP HELPERS ---
        function showTooltip(e, content) {
            const tooltip = document.getElementById('tooltip');
            tooltip.style.display = 'block';
            tooltip.style.left = (e.pageX + 15) + 'px';
            tooltip.style.top = (e.pageY + 15) + 'px';
            tooltip.innerHTML = content;
        }
        function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

        // --- NEWS TICKER ---
        let firstMessageShown = false;
        let currentNewsIndex = 0;
        function updateNews() {
            const newsElement = document.getElementById('news-text');
            newsElement.innerText = newsMessages[currentNewsIndex];
            if (!firstMessageShown) { newsMessages.shift(); firstMessageShown = true; } 
            else { currentNewsIndex = (currentNewsIndex + 1) % newsMessages.length; }
            newsElement.style.animation = 'none';
            newsElement.offsetHeight; 
            newsElement.style.animation = 'ticker 20s linear infinite';
        }

        document.getElementById('bitcoin').onclick = (e) => {
    let val = gameData.clickValue;

    // FIX: Apply 10x boost to clicking if Singularity is owned
    if (gameData.boughtUpgrades.includes("n20")) {
        val *= 10;
    }

    gameData.bitcoin += val;
    updateDisplay();

    // Create floating text
    const fly = document.createElement('div');
    fly.className = 'floating-text';
    fly.innerText = `+${val >= 1000 ? (val/1000).toFixed(1)+'k' : Math.floor(val)}`;
    fly.style.left = e.clientX + 'px';
    fly.style.top = e.clientY + 'px';
    document.body.appendChild(fly);
    setTimeout(() => fly.remove(), 800);
};

        // --- MAIN LOOPS ---
        setInterval(() => {
            gameData.bitcoin += calculateCurrentBPS();
            updateDisplay();
        }, 1000);

        setInterval(saveGame, 30000); 
        setInterval(updateNews, 20000); 
// Disable right-click menu
document.addEventListener('contextmenu', event => event.preventDefault());
        // Start
        loadGame();
        updateNews();
    </script>
</body>
</html>
